<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manish Clothing | Premium Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f9f9f9; color: #333; }
        
        /* Navigation */
        nav { background: #000; color: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        nav h1 { font-size: 24px; letter-spacing: 2px; }
        nav ul { list-style: none; display: flex; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 14px; }

        /* Hero Section */
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?auto=format&fit=crop&w=1350&q=80') center/cover; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h2 { font-size: 40px; margin-bottom: 10px; }
        .btn { background: #ff4757; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #ff6b81; transform: scale(1.05); }

        /* Product Section */
        .container { padding: 50px 5%; text-align: center; }
        .section-title { margin-bottom: 30px; font-size: 28px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .price { color: #ff4757; font-weight: bold; margin: 10px 0; }
        
        footer { background: #000; color: #666; text-align: center; padding: 20px; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <h1>MANISH CLOTHING</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h2>Latest Summer Collection</h2>
        <p>Premium & Affordable Style for Everyone</p><br>
        <a href="#shop" class="btn">Shop Now</a>
    </section>

    <div class="container" id="shop">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80" alt="Tshirt">
                <h3>Classic White Tee</h3>
                <p class="price">₹799</p>
                <a href="#" class="btn" style="padding: 8px 15px; font-size: 12px;">Add to Cart</a>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=500&q=80" alt="Jeans">
                <h3>Slim Fit Denim</h3>
                <p class="price">₹1,499</p>
                <a href="#" class="btn" style="padding: 8px 15px; font-size: 12px;">Add to Cart</a>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=500&q=80" alt="Jacket">
                <h3>Bomber Jacket</h3>
                <p class="price">₹2,999</p>
                <a href="#" class="btn" style="padding: 8px 15px; font-size: 12px;">Add to Cart</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Manish Clothing. All Rights Reserved.
    </footer>

</body>
</html>
